<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#101820"/>
  <rect x="0" y="0" width="14" height="675" fill="#C43C32"/>
  <text x="55" y="58" fill="#E0A83A" font-family="Arial" font-size="16" font-weight="700">SEIS EVIDENCIAS CONTRA SEIS ESPECULACIONES</text>
  <text x="55" y="108" fill="#F7F2EA" font-family="Georgia" font-size="38" font-weight="700">¿Hay un cambio de mentalidad</text>
  <text x="55" y="150" fill="#F7F2EA" font-family="Georgia" font-size="38" font-weight="700">en Cuba?</text>
  <line x1="90" y1="338" x2="1110" y2="338" stroke="#6F7B7B" stroke-width="5"/>
  <g font-family="Arial">
    <circle cx="110" cy="338" r="19" fill="#C43C32"/>
    <text x="65" y="392" fill="#E0A83A" font-size="20" font-weight="700">2021</text>
    <text x="65" y="424" fill="#F7F2EA" font-size="21" font-weight="700">Legitimidad</text>
    <text x="65" y="450" fill="#F7F2EA" font-size="21" font-weight="700">erosionada</text>
    <text x="65" y="484" fill="#c7cfcd" font-size="15">70.6% confía poco</text>
    <text x="65" y="505" fill="#c7cfcd" font-size="15">o nada en el sistema</text>

    <circle cx="350" cy="338" r="19" fill="#E0A83A"/>
    <text x="310" y="252" fill="#E0A83A" font-size="20" font-weight="700">2023</text>
    <text x="288" y="284" fill="#F7F2EA" font-size="21" font-weight="700">Voto como</text>
    <text x="288" y="310" fill="#F7F2EA" font-size="21" font-weight="700">alienación</text>
    <text x="288" y="208" fill="#c7cfcd" font-size="15">79% siente que su</text>
    <text x="288" y="229" fill="#c7cfcd" font-size="15">voto no importa</text>

    <circle cx="590" cy="338" r="19" fill="#2A9D8F"/>
    <text x="535" y="392" fill="#E0A83A" font-size="20" font-weight="700">2024-25</text>
    <text x="535" y="424" fill="#F7F2EA" font-size="21" font-weight="700">Firewall</text>
    <text x="535" y="450" fill="#F7F2EA" font-size="21" font-weight="700">cívico</text>
    <text x="535" y="484" fill="#c7cfcd" font-size="15">Preserva agencia</text>
    <text x="535" y="505" fill="#c7cfcd" font-size="15">y memoria</text>

    <circle cx="830" cy="338" r="19" fill="#C43C32"/>
    <text x="790" y="252" fill="#E0A83A" font-size="20" font-weight="700">2026</text>
    <text x="755" y="284" fill="#F7F2EA" font-size="21" font-weight="700">La crisis entra</text>
    <text x="755" y="310" fill="#F7F2EA" font-size="21" font-weight="700">al hogar</text>
    <text x="755" y="208" fill="#c7cfcd" font-size="15">36.5% hogar</text>
    <text x="755" y="229" fill="#c7cfcd" font-size="15">muy mal en Pulso 2</text>

    <circle cx="1070" cy="338" r="19" fill="#2A9D8F"/>
    <text x="1018" y="392" fill="#E0A83A" font-size="20" font-weight="700">ANE/CIPE</text>
    <text x="992" y="424" fill="#F7F2EA" font-size="21" font-weight="700">Autonomía bajo</text>
    <text x="992" y="450" fill="#F7F2EA" font-size="21" font-weight="700">restricción</text>
    <text x="992" y="484" fill="#c7cfcd" font-size="15">84.4% ve empleo</text>
    <text x="992" y="505" fill="#c7cfcd" font-size="15">privado o mixto</text>
  </g>
  <rect x="150" y="585" width="900" height="48" rx="10" fill="#18313C" stroke="#34515A"/>
  <text x="600" y="616" text-anchor="middle" fill="#F7F2EA" font-family="Arial" font-size="20" font-weight="700">Disidencia latente -> expresiva si bajan costos -> articulada si hay redes</text>
</svg>
